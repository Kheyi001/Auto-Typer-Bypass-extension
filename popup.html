<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    p {
      font-size: 13px;
      color: #555;
    }
    textarea {
      width: 100%;
      height: 180px;
      box-sizing: border-box;
      margin-bottom: 15px;
      padding: 8px;
      font-family: monospace;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    button:hover {
      background: #0056b3;
    }
    #status {
      margin-top: 10px;
      color: #28a745;
      font-size: 13px;
      text-align: center;
      display: none;
      font-weight: bold;
    }
    .shortcut {
      display: inline-block;
      background: #eee;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #ddd;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h3>Auto Typer</h3>
  <p>Paste your snippet here and save. Then, focus the target input field on the webpage and press <span class="shortcut">Alt + V</span> to begin auto-typing.</p>
  <textarea id="textInput" placeholder="Paste your code here..."></textarea>
  <div style="margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 4px; border: 1px solid #ddd;">
    <label style="font-size:12px; color:#555; display:block; margin-bottom: 4px;">Normal Speed (ms - 80% of letters):</label>
    <input type="number" id="fastSpeed" value="50" min="1" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 6px; border: 1px solid #ccc; border-radius: 3px;">
    
    <label style="font-size:12px; color:#555; display:block; margin-bottom: 4px;">Slow Speed (ms - 20% of letters):</label>
    <input type="number" id="slowSpeed" value="3000" min="1" style="width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #ccc; border-radius: 3px;">
  </div>
  <button id="saveBtn">Save Text</button>
  <div id="status">Saved Successfully!</div>
  <script src="popup.js"></script>
</body>
</html>
